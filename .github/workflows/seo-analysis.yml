name: SEO Analysis & Auto-Improvement PR

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 7:00 JST (22:00 UTC前日)
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write
  pull-requests: write

jobs:
  seo-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run SEO Analysis
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        id: analysis
        run: npx tsx scripts/seo-analysis.ts

      - name: Commit daily master data snapshot
        if: steps.analysis.conclusion == 'success'
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/data/
          if git diff --cached --quiet; then
            echo "No master data changes to commit"
          else
            git commit -m "seo-data: daily snapshot ${DATE}"
            git push origin HEAD:main
          fi

      - name: Create PR if issues found
        id: create_pr
        if: steps.analysis.outputs.has_issues == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          RUN_ID="${{ github.run_id }}"
          BRANCH="seo-analysis/${DATE}-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -f reports/
          git commit -m "SEO analysis report: ${DATE}"
          git push origin "$BRANCH"

          REPORT_FILE="reports/seo-${DATE}.md"

          PR_URL=$(gh pr create \
            --title "SEO分析レポート: ${DATE}" \
            --body-file "$REPORT_FILE" \
            --base main \
            --head "$BRANCH" 2>&1 | grep "https://")

          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: always() && steps.analysis.conclusion == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          REPORT_FILE="reports/seo-${DATE}.md"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "No report file found, skipping Slack notification"
            exit 0
          fi

          PR_URL="${{ steps.create_pr.outputs.pr_url }}"
          ACTIONS_URL="https://github.com/mkmanabu122003/kaigai-digital/actions/runs/${{ github.run_id }}"

          # Build summary from report
          TOTAL_CLICKS=$(grep '総クリック数' "$REPORT_FILE" | grep -oE '[0-9]+' || echo "0")
          TOTAL_IMP=$(grep '総表示回数' "$REPORT_FILE" | grep -oE '[0-9]+' || echo "0")
          AVG_CTR=$(grep '平均CTR' "$REPORT_FILE" | grep -oE '[0-9.]+%' || echo "N/A")
          ISSUE_COUNT=$(grep '検出した課題' "$REPORT_FILE" | grep -oE '[0-9]+件' | head -1 || echo "0件")

          # Build Slack message
          MSG="🔍 *SEO分析レポート: ${DATE}*\n\n"
          MSG+="*サマリー（過去28日間）*\n"
          MSG+="• クリック: ${TOTAL_CLICKS} | 表示: ${TOTAL_IMP} | CTR: ${AVG_CTR}\n"
          MSG+="• 検出した課題: ${ISSUE_COUNT}\n"

          if [ -n "$PR_URL" ]; then
            MSG+="\n📎 *改善PR:* ${PR_URL}\n"
          fi

          MSG+="\n📊 *詳細レポート:* ${ACTIONS_URL}"

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(printf '{"text": "%s"}' "$MSG")"

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-report
          path: reports/seo-*.md
          retention-days: 30
