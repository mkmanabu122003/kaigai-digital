name: SEO Analysis & Auto-Improvement PR

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 7:00 JST (22:00 UTC前日)
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write
  pull-requests: write

jobs:
  seo-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run SEO Analysis
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        id: analysis
        run: npx tsx scripts/seo-analysis.ts

      - name: Create PR if issues found
        if: steps.analysis.outputs.has_issues == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          RUN_ID="${{ github.run_id }}"
          BRANCH="seo-analysis/${DATE}-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -f reports/
          git commit -m "SEO analysis report: ${DATE}"
          git push origin "$BRANCH"

          REPORT_FILE="reports/seo-${DATE}.md"

          gh pr create \
            --title "SEO分析レポート: ${DATE}" \
            --body-file "$REPORT_FILE" \
            --base main \
            --head "$BRANCH"

      - name: Notify Slack
        if: always() && steps.analysis.conclusion == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          REPORT_FILE="reports/seo-${DATE}.md"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "No report file found, skipping Slack notification"
            exit 0
          fi

          # Extract summary section (first 30 lines)
          SUMMARY=$(head -40 "$REPORT_FILE" | sed 's/"/\\"/g' | tr '\n' '\\' | sed 's/\\/\\n/g')

          ISSUE_COUNT=$(grep -c "^|" "$REPORT_FILE" | tail -1 || echo "0")
          PR_URL=""
          if [ "${{ steps.analysis.outputs.has_issues }}" = "true" ]; then
            PR_URL=$(gh pr list --repo mkmanabu122003/kaigai-digital --state open --search "SEO分析レポート: ${DATE}" --json url --jq '.[0].url' 2>/dev/null || echo "")
          fi

          PR_LINK=""
          if [ -n "$PR_URL" ]; then
            PR_LINK="\n\n📎 *PR:* ${PR_URL}"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🔍 *SEO分析レポート: ${DATE}*\n\n$(head -20 "$REPORT_FILE" | grep -E '^\|' | head -8 | sed 's/"/\\"/g' | tr '\n' '\\' | sed 's/\\/\\n/g')${PR_LINK}\n\n📊 詳細はGitHub Actionsのartifactを確認\"
            }"

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-report
          path: reports/seo-*.md
          retention-days: 30
