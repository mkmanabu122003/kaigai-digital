name: SEO Analysis & Auto-Improvement PR

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 7:00 JST (22:00 UTC前日)
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write
  pull-requests: write

jobs:
  seo-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run SEO Analysis
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        id: analysis
        run: npx tsx scripts/seo-analysis.ts

      - name: Create PR if issues found
        if: steps.analysis.outputs.has_issues == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="seo-analysis/${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -f reports/
          git commit -m "SEO analysis report: ${DATE}"
          git push origin "$BRANCH"

          REPORT_FILE="reports/seo-${DATE}.md"
          BODY=$(cat "$REPORT_FILE" | head -100)

          gh pr create \
            --title "SEO分析レポート: ${DATE}" \
            --body "${BODY}

          ---
          🤖 Generated by SEO Analysis Workflow" \
            --base main \
            --head "$BRANCH"

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-report
          path: reports/seo-*.md
          retention-days: 30
