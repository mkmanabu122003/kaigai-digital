name: Weekly Index Coverage Check

on:
  schedule:
    - cron: '0 23 * * 0'  # 毎週月曜 8:00 JST（日曜23:00 UTC）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coverage-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run URL Inspection API coverage check
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
        run: npx tsx scripts/check-index-coverage.ts

      - name: Commit coverage snapshot
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/data/coverage/
          if git diff --cached --quiet; then
            echo "No coverage changes to commit"
          else
            git commit -m "coverage: weekly snapshot ${DATE}"
            git push origin HEAD:main
          fi
