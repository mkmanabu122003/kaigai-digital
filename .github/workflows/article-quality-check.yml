name: Article Quality Check
on:
  pull_request:
    paths:
      - 'src/content/countries/**'
      - 'src/content/compare/**'
      - 'src/content/guide/**'

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Quality Check
        run: npx tsx scripts/quality-check.ts
      - name: Internal Link Check
        run: npx tsx scripts/check-internal-links.ts
